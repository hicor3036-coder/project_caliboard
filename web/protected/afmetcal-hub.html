<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFMETCAL 학습 허브 — 군 교정체계 구조 익히기</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a2129; --panel2:#222b35; --line:#2f3b47;
    --txt:#e6edf3; --dim:#8b98a5; --accent:#f0a500; --accent2:#4a9eff;
    --kolas:#3fb950; --mil:#ff7b72; --gov:#d2a8ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:"Malgun Gothic","Segoe UI",sans-serif;line-height:1.6;font-size:14px}
  .wrap{display:flex;min-height:100vh}
  /* 좌측: 계층도 */
  .left{width:46%;padding:24px;border-right:1px solid var(--line);overflow-y:auto;height:100vh}
  .right{width:54%;padding:28px 32px;overflow-y:auto;height:100vh}
  h1{font-size:20px;color:var(--accent);margin-bottom:4px}
  .sub{color:var(--dim);font-size:12px;margin-bottom:20px}
  .tierlabel{font-size:11px;color:var(--dim);letter-spacing:1px;margin:18px 0 8px;text-transform:uppercase}
  .tier-policy{border-left:3px solid var(--gov)}
  .tier-mgmt{border-left:3px solid var(--accent)}
  .tier-ops{border-left:3px solid var(--accent2)}
  .tier-intl{border-left:3px solid var(--kolas)}
  .doc{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin:8px 0;cursor:pointer;transition:.15s;position:relative}
  .doc:hover{background:var(--panel2);border-color:var(--accent)}
  .doc.active{background:var(--panel2);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .doc .code{font-weight:700;font-size:15px}
  .doc .name{color:var(--dim);font-size:12px;margin-top:2px}
  .doc .tag{position:absolute;top:10px;right:12px;font-size:10px;padding:2px 7px;border-radius:10px}
  .tag-done{background:#1f6f3f;color:#d3f5e0}
  .tag-todo{background:#3a3a1a;color:#e8e0a0}
  .arrow{text-align:center;color:var(--dim);font-size:18px;margin:-2px 0}
  .flow{font-size:11px;color:var(--dim);text-align:center;margin:2px 0}
  .legend{margin-top:24px;padding-top:16px;border-top:1px solid var(--line);font-size:11px;color:var(--dim)}
  .legend span{display:inline-block;margin-right:14px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
  /* 문서 계층 (좌측 신규) */
  .status-legend{display:flex;flex-wrap:wrap;align-items:center;gap:10px;font-size:11px;color:var(--dim);padding:8px 10px;background:var(--panel);border:1px solid var(--line);border-radius:8px;margin-bottom:8px}
  .status-legend .sl-title{font-weight:700;color:var(--txt)}
  .sl-filter{display:inline-flex;align-items:center;gap:4px;background:var(--panel2);border:1px solid var(--line);color:var(--dim);padding:3px 10px;border-radius:12px;cursor:pointer;font-size:11px;font-family:inherit}
  .sl-filter:hover{color:var(--txt)}
  .sl-filter.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .sl-dot{width:9px;height:9px;border-radius:50%}
  .tree-summary{font-size:11.5px;color:var(--dim);padding:6px 2px;margin-bottom:6px}
  .tree-summary b{color:var(--accent)}
  .tree-summary .sum-hint{color:#caa45a}
  .area{margin-bottom:14px;border-left:3px solid var(--ac);border-radius:0 8px 8px 0;background:rgba(255,255,255,.012);padding:6px 0 6px 0}
  .area-head{display:flex;align-items:baseline;gap:8px;padding:4px 12px 8px}
  .area-en{font-size:13px;font-weight:700;color:var(--ac)}
  .area-ko{font-size:11px;color:var(--dim)}
  .area-cnt{margin-left:auto;font-size:11px;color:var(--dim);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:1px 8px}
  .area-rows{display:flex;flex-direction:column}
  .doc-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid rgba(255,255,255,.04);font-size:12px}
  .doc-row .dr-status{width:8px;height:8px;border-radius:50%;background:var(--st);flex-shrink:0}
  .doc-row .dr-code{font-weight:700;color:var(--txt);flex-shrink:0;min-width:128px}
  .doc-row .dr-name{color:var(--dim);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .doc-row .dr-meta{font-size:10px;color:var(--dim);opacity:.7;flex-shrink:0;white-space:nowrap}
  .doc-row .dr-badge{font-size:9.5px;padding:1px 7px;border-radius:9px;flex-shrink:0;white-space:nowrap}
  .doc-row .dr-go{font-size:10px;color:var(--accent2);flex-shrink:0}
  .doc-row.link{cursor:pointer}
  .doc-row.link:hover{background:var(--panel2)}
  .doc-row.active{background:var(--panel2);box-shadow:inset 2px 0 0 var(--accent)}
  /* 우측 슬라이드 패널 (전체 흐름 문서 상세) */
  #slideOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:.25s;z-index:90}
  #slideOverlay.show{opacity:1;visibility:visible}
  #slidePanel{position:fixed;top:0;right:0;height:100vh;width:min(clamp(560px,42vw,880px),96vw);background:var(--bg);border-left:1px solid var(--line);box-shadow:-8px 0 24px rgba(0,0,0,.4);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:100;display:flex;flex-direction:column}
  #slidePanel.open{transform:translateX(0)}
  #slideClose{position:absolute;top:12px;right:14px;z-index:2;background:var(--panel2);border:1px solid var(--line);color:var(--dim);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px}
  #slideClose:hover{color:var(--txt);border-color:var(--accent)}
  #slideBody{overflow-y:auto;padding:28px 30px;height:100%}
  .slide-todo{color:var(--dim);text-align:center;margin-top:60px}
  .slide-todo h2{color:var(--accent);font-size:20px;margin-bottom:10px}
  /* 용어 호버 힌트 */
  .gloss-term{border-bottom:1px dotted var(--accent2);cursor:help}
  #glossTip{position:fixed;z-index:200;max-width:320px;background:var(--panel2);border:1px solid var(--accent2);border-radius:8px;padding:10px 13px;box-shadow:0 6px 20px rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:opacity .12s;pointer-events:none;font-size:12.5px}
  #glossTip.show{opacity:1;visibility:visible}
  #glossTip .gt-abbr{font-weight:700;color:var(--accent2);font-size:14px}
  #glossTip .gt-full{color:var(--dim);font-size:10.5px;font-style:italic;margin:1px 0 6px}
  #glossTip .gt-desc{color:var(--txt);line-height:1.55}
  #glossTip .gt-desc b{color:var(--accent)}
  /* 우측 패널 */
  .placeholder{color:var(--dim);text-align:center;margin-top:80px}
  .placeholder .big{font-size:48px;margin-bottom:12px}
  .panel-doc h2{font-size:22px;color:var(--accent);margin-bottom:2px}
  .panel-doc .ename{color:var(--dim);font-size:13px;margin-bottom:18px}
  .oneliner{background:var(--panel);border-left:3px solid var(--accent);padding:14px 16px;border-radius:0 8px 8px 0;margin-bottom:10px;font-size:15px}
  /* 초보자 보조: 위치/계보 + 비유 */
  .primer{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
  .primer .row{display:flex;gap:8px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:12.5px;color:var(--dim)}
  .primer .row .ic{flex-shrink:0;font-size:13px}
  .primer .row b{color:var(--txt);font-weight:600}
  .primer .lineage{border-left:3px solid var(--accent2)}
  .primer .analogy{border-left:3px solid var(--kolas)}
  .sec{margin-bottom:22px}
  .sec h3{font-size:13px;color:var(--accent2);margin-bottom:8px;letter-spacing:.5px}
  .flowlist{counter-reset:step}
  .flowlist li{list-style:none;padding:6px 0 6px 30px;position:relative;border-bottom:1px solid var(--line)}
  .flowlist li:before{counter-increment:step;content:counter(step);position:absolute;left:0;top:6px;background:var(--accent2);color:#fff;width:20px;height:20px;border-radius:50%;text-align:center;font-size:11px;line-height:20px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .col-kolas{color:var(--kolas)}
  .col-mil{color:var(--mil)}
  .strange{background:var(--panel);border:1px solid var(--mil);border-radius:8px;padding:12px 14px;margin-top:8px}
  .strange .t{color:var(--mil);font-weight:700;font-size:12px;margin-bottom:6px}
  .strange ol{margin-left:18px;font-size:13px}
  .strange li{margin:4px 0}
  .biz{background:#1a2a1f;border-left:3px solid var(--kolas);padding:12px 14px;border-radius:0 8px 8px 0;font-size:13px;margin-top:18px}
  /* 원문 상세 접이식 */
  .detail{margin-top:18px;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .detail summary{cursor:pointer;padding:11px 14px;font-size:13px;font-weight:600;color:var(--accent);background:var(--panel);list-style:none;user-select:none}
  .detail summary::-webkit-details-marker{display:none}
  .detail summary::before{content:"▶ ";font-size:10px;color:var(--dim)}
  .detail[open] summary::before{content:"▼ "}
  .detail summary:hover{background:var(--panel2)}
  .detail .body{padding:6px 16px 14px;font-size:13px;border-top:1px solid var(--line)}
  .grp{margin-top:12px;font-size:13px}
  .grp:first-child{margin-top:6px}
  .grp .h{color:var(--accent2);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
  .grp ul{margin-left:18px}
  .grp li{margin:4px 0;line-height:1.55}
  .src{margin-top:14px;padding-top:10px;border-top:1px dashed var(--line);font-size:11px;color:var(--dim)}
  .biz b{color:var(--kolas)}
  /* 통번역 (원문↓번역 위아래 교차) */
  .trans{margin-top:18px;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .trans summary{cursor:pointer;padding:11px 14px;font-size:13px;font-weight:600;color:var(--accent2);background:var(--panel);list-style:none;user-select:none}
  .trans summary::-webkit-details-marker{display:none}
  .trans summary::before{content:"▶ ";font-size:10px;color:var(--dim)}
  .trans[open] summary::before{content:"▼ "}
  .trans summary:hover{background:var(--panel2)}
  .trans .body{padding:8px 16px 16px;border-top:1px solid var(--line)}
  .tr-h{color:var(--accent);font-weight:700;font-size:14px;margin:18px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--line)}
  .tr-h:first-child{margin-top:8px}
  .tr-clause{margin:12px 0;padding-left:12px;border-left:2px solid var(--line)}
  .tr-no{color:var(--accent2);font-weight:700;font-size:12px;font-family:"Consolas",monospace;margin-bottom:3px}
  .tr-en{color:var(--dim);font-size:12px;line-height:1.55;font-style:italic;margin-bottom:5px}
  .tr-kr{color:var(--txt);font-size:13.5px;line-height:1.7}
  .tr-depth1{margin-left:0}
  .tr-depth2{margin-left:18px}
  .tr-depth3{margin-left:36px;border-left-color:var(--panel2)}
  .tr-note{background:var(--panel);border-left:3px solid var(--accent);padding:7px 12px;border-radius:0 6px 6px 0;font-size:12px;color:var(--dim);margin:6px 0}
  .tr-note b{color:var(--accent)}
  .tr-meta{font-size:11px;color:var(--dim);background:var(--panel);padding:8px 12px;border-radius:6px;margin-bottom:6px;line-height:1.6}
  /* 통번역 장(章) 아코디언 — 섹션 단위 접기 */
  .tr-acc{border:1px solid var(--line);border-radius:8px;margin:8px 0;overflow:hidden;background:var(--panel2)}
  .tr-acc>summary{list-style:none;cursor:pointer;padding:11px 14px;font-weight:700;font-size:13.5px;color:var(--accent);display:flex;align-items:center;gap:8px;user-select:none;background:var(--panel)}
  .tr-acc>summary::-webkit-details-marker{display:none}
  .tr-acc>summary:hover{background:var(--panel2)}
  .tr-acc>summary .caret{transition:transform .2s;color:var(--dim);font-size:11px}
  .tr-acc[open]>summary .caret{transform:rotate(90deg)}
  .tr-acc>summary .cnt{margin-left:auto;font-weight:400;font-size:11px;color:var(--dim);font-family:"Consolas",monospace}
  .tr-acc-body{padding:4px 14px 12px}
  .tr-acc-body .tr-h{display:none} /* 헤더는 summary로 승격됐으니 본문에선 숨김 */
  .tr-acc-body .tr-clause:first-child,.tr-acc-body .tr-note:first-child{margin-top:6px}
  .dtabs{display:flex;gap:4px;flex-wrap:wrap;position:sticky;top:0;z-index:5;background:var(--bg);padding:10px 0 8px;margin-top:4px;border-bottom:1px solid var(--line)}
  .dtab{background:var(--panel);border:1px solid var(--line);color:var(--dim);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;white-space:nowrap}
  .dtab:hover{background:var(--panel2);color:var(--txt)}
  .dtab.active{background:var(--accent);border-color:var(--accent);color:#11161c}
  .dtab-pane{display:none;padding-top:14px}
  .dtab-pane.active{display:block}
  .todo-note{color:var(--dim);font-style:italic;margin-top:40px;text-align:center}
  /* 탭 */
  .tabs{display:flex;align-items:center;gap:6px;padding:10px 24px;background:var(--panel);border-bottom:1px solid var(--line)}
  .tab{background:transparent;border:1px solid var(--line);color:var(--dim);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit}
  .tab:hover{color:var(--txt);border-color:var(--accent)}
  .tab.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent);font-weight:700}
  .tabhint{margin-left:auto;color:var(--dim);font-size:12px}
  /* 용어집 */
  .gloss-wrap{max-width:1100px;padding:24px 32px}
  .gloss-head h1{font-size:20px;color:var(--accent);margin-bottom:4px}
  #search{width:100%;margin:16px 0 12px;padding:11px 14px;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:14px;font-family:inherit}
  #search:focus{outline:none;border-color:var(--accent)}
  .gfilter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
  .gf{background:var(--panel);border:1px solid var(--line);color:var(--dim);padding:5px 12px;border-radius:14px;cursor:pointer;font-size:12px;font-family:inherit}
  .gf:hover{color:var(--txt)}
  .gf.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .glosslist{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .term{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px 14px;border-left-width:3px}
  .term.kr{border-left-color:var(--kolas)}
  .term.us{border-left-color:var(--accent2)}
  .term.mil{border-left-color:var(--mil)}
  .term.metro{border-left-color:var(--accent)}
  .term.doc{border-left-color:var(--gov)}
  .term .abbr{font-weight:700;font-size:15px;color:var(--txt)}
  .term .full{color:var(--dim);font-size:11px;margin:2px 0 6px;font-style:italic}
  .term .desc{font-size:13px}
  .term .desc b{color:var(--accent)}
  .nohit{grid-column:1/-1;text-align:center;color:var(--dim);padding:40px}
  @media(max-width:900px){.glosslist{grid-template-columns:1fr}}
  /* 신뢰의 사슬 */
  .chain-wrap{max-width:1000px;padding:24px 32px}
  .chain-head h1{font-size:21px;color:var(--accent);margin-bottom:10px}
  .chain-head .chain-q{font-size:16px;margin-bottom:6px}
  .chain-head .chain-a{color:var(--dim);font-size:13px;line-height:1.7;margin-bottom:12px}
  .chain-head .chain-a b{color:var(--txt)}
  .chain-head .chain-note{background:#2a2418;border:1px solid #5a4a1a;color:#e8d9a0;font-size:12px;padding:9px 13px;border-radius:8px;margin-bottom:20px}
  .chain-legend{margin-top:14px;padding:11px 14px;background:var(--panel);border:1px solid var(--line);border-radius:8px;font-size:12px;color:var(--dim);text-align:center}
  .chain-legend b{color:var(--txt)}
  .ring{display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--rc);border-radius:10px;padding:14px 16px}
  .ring-no{flex-shrink:0;font-size:24px;font-weight:700;color:var(--rc);width:34px;text-align:center;line-height:1.2}
  .ring-body{flex:1;min-width:0}
  .ring-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .ring-q{font-size:16px;font-weight:700;color:var(--txt)}
  .ring-topic{flex-shrink:0;font-size:11px;color:var(--rc);border:1px solid var(--rc);border-radius:10px;padding:2px 9px;opacity:.85}
  .ring-a{font-size:13.5px;color:var(--dim);line-height:1.6;margin-bottom:9px}
  .ring-a b{color:var(--txt)}
  .ring-docs{display:flex;flex-wrap:wrap;gap:6px}
  .ring-doc{font-size:11.5px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:3px 9px;color:var(--txt)}
  .ring-link{text-align:center;margin:-2px 0}
  .ring-arrow{color:var(--dim);font-size:20px}
  .chain-root{margin-top:18px;padding:14px 16px;background:#1a2a1f;border:1px solid var(--kolas);border-radius:10px;font-size:13.5px;color:#cfe9d6;text-align:center}
  .chain-root b{color:var(--kolas)}
  /* 과업 지도 (stage/task) */
  .map-root{padding:11px 16px;background:#1a2a1f;border:1px solid var(--kolas);border-radius:10px;font-size:13.5px;color:#cfe9d6;text-align:center;margin-bottom:14px}
  .map-root b{color:var(--kolas)}
  .stage{border:1px solid var(--line);border-left:4px solid var(--sc);border-radius:10px;padding:12px 14px;background:rgba(255,255,255,.015)}
  .stage-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .stage-name{font-size:16px;font-weight:700;color:var(--sc)}
  .stage-sub{font-size:11px;color:var(--dim);border:1px solid var(--sc);border-radius:10px;padding:2px 9px;opacity:.8}
  .stage-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}
  .task{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--tc);border-radius:8px;padding:11px 13px}
  .task-no{font-size:18px;font-weight:700;color:var(--tc);margin-bottom:3px}
  .task-title{font-size:14.5px;font-weight:700;color:var(--txt);margin-bottom:6px}
  .task-desc{font-size:12.5px;color:var(--dim);line-height:1.55;margin-bottom:9px}
  .task-desc b{color:var(--txt)}
  .task-docs{display:flex;flex-wrap:wrap;gap:5px}
  .task-doc{font-size:11.5px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:4px 10px;color:var(--dim);white-space:nowrap}
  .task-doc.link{cursor:pointer;color:var(--accent2);border-color:rgba(74,158,255,.4)}
  .task-doc.link:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .task-doc.lensjump{cursor:pointer;font-weight:700;color:#7c6cff;border-color:rgba(124,108,255,.5);background:rgba(124,108,255,.08)}
  .task-doc.lensjump:hover{background:#7c6cff;color:#fff;border-color:#7c6cff}
  .stage-arrow{text-align:center;color:var(--dim);font-size:16px;margin:2px 0}
  /* 전체 흐름 관점 */
  .lens-tabs{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 4px}
  .lens{background:var(--panel);border:1px solid var(--line);color:var(--dim);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit}
  .lens:hover{color:var(--txt);border-color:var(--accent)}
  .lens.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent);font-weight:700}
  /* 세로 타임라인 */
  .timeline{margin-top:8px}
  .tstep{display:flex;gap:16px;align-items:stretch}
  .tstep-rail{position:relative;flex-shrink:0;width:34px;display:flex;justify-content:center}

    translation:{

      items:[

        {no:"표제", en:"BY ORDER OF THE SECRETARY OF THE AIR FORCE — DEPARTMENT OF THE AIR FORCE MANUAL 21-113, 27 DECEMBER 2023, Maintenance — AIR FORCE METROLOGY AND CALIBRATION PROGRAM MANAGEMENT", kr:"공군부 장관 명령에 의거 — 공군부 매뉴얼(DAFMAN) 21-113, 2023년 12월 27일, 정비 분야 — <b>공군 측정·교정 프로그램 관리</b>"},
        {no:"발행정보", en:"COMPLIANCE WITH THIS PUBLICATION IS MANDATORY. OPR: AF/A4LM. Certified by: SAF/AQD. Supersedes: AFMAN 21-113, 29 April 2020. Pages: 29.", kr:"이 간행물의 준수는 <b>의무</b>다. 주관부서(OPR): AF/A4LM. 인증: SAF/AQD. 대체 대상: AFMAN 21-113(2020.4.29). 분량: 29쪽."},
        {note:"옛 이름 <b>AFMAN</b>(공군 매뉴얼)을 <b>DAFMAN</b>(공군부 매뉴얼)으로 개명 — 2019년 우주군(USSF) 창설로 '공군'이 '공군부(공군+우주군)'로 확장됐기 때문. 같은 문서의 새 판이다."},
        {no:"적용범위", en:"This publication implements Air Force Policy Directive 21-1, Maintenance of Military Materiel. ... This publication applies to all Department of the Air Force (DAF) civilian employees and uniformed members of the Regular Air Force, the Air Force Reserve, the Air National Guard, the United States Space Force, the Civil Air Patrol ..., and those with a contractual obligation to abide by the terms of DAF publications.", kr:"이 간행물은 공군 정책지침(DAFPD) 21-1 「군용 물자의 정비」를 시행한다. … 적용 대상은 공군부(DAF)의 모든 민간 직원과 현역 공군·공군예비군·주방위공군·<b>우주군(USSF)</b>·민간항공초계대(공식 공군 보조임무 수행 시), 그리고 공군부 간행물 준수의 <b>계약상 의무</b>를 진 자 전부다."},
        {note:"마지막 줄이 핵심 — \"<b>계약상 의무를 진 자</b>\"에 군 규격을 따르기로 계약한 <b>해외 업체</b>도 포함된다. K-METCAL 같은 FMS 수출 사업이 이 군 표준을 따라야 하는 법적 근거가 여기서 나온다."},
        {no:"Tier 면제", en:"The authorities to waive wing/unit level requirements in this publication are identified with a tier (\"T-0, T-1, T-2, T-3\") number following the compliance statement.", kr:"이 간행물에서 비행단·부대급 요구사항을 <b>면제할 권한</b>은 준수 문구 뒤에 붙는 <b>등급(T-0, T-1, T-2, T-3)</b> 숫자로 표시한다. (T-0=외부 법령, 가장 엄격 → T-3=현장 지휘관 재량)"},
        {h:"제1장 §1.1 — 도입 (프로그램 철학)"},
        {no:"1.1.", en:"Introduction. The Air Force Metrology and Calibration (AFMETCAL) Program is a hierarchical system of Precision Measurement Equipment Laboratories, other calibration operations, personnel, equipment, and procedures to ensure systems and equipment measurements are safe, accurate, uniform, reliable, and traceable to the International System of Units through the National Institute of Standards and Technology (NIST) or AFMETCAL approved sources.", kr:"<b>도입.</b> 공군 측정·교정(AFMETCAL) 프로그램은 정밀측정장비 실험실(PMEL)·기타 교정 운영·인력·장비·절차로 이뤄진 <b>계층적 시스템</b>이며, 시스템과 장비의 측정이 <b>안전·정확·균일·신뢰</b>하고 NIST 또는 AFMETCAL 승인 출처를 통해 <b>국제단위계(SI)까지 소급</b>되도록 보장한다."},
        {note:"\"<b>safe, accurate, uniform, reliable, traceable</b>\"(안전·정확·균일·신뢰·소급) — 이 다섯 단어가 메모리에 기록된 \"21-113의 정신 5단어\". 측정이 갖춰야 할 모든 가치를 한 문장에 압축했다."},
        {no:"1.1.1.", en:"Test, measurement, and diagnostic equipment (TMDE) used to make or verify meaningful (quantifiable) measurements will be calibrated [per] Technical Order (TO) 33K-1-100-1 ... and TO 33K-1-100-2-1 ...", kr:"의미 있는(정량적) 측정을 <b>수행하거나 검증</b>하는 데 쓰이는 시험·측정·진단 장비(TMDE)는 기술교범 TO 33K-1-100-1(교정 절차·교정측정요약) 및 TO 33K-1-100-2-1(PMEL 전용 교정 노트·주기·참조 가이드)에 따라 <b>교정한다</b>."},
        {no:"1.1.2.", en:"The AFMETCAL Program's primary mission is to support calibration activities to maintain, calibrate, and certify TMDE for the AF, other services, federal agencies, and countries supported through Foreign Military Sales.", kr:"AFMETCAL 프로그램의 <b>1차 임무</b>는 공군·타군·연방기관, 그리고 <b>대외군사판매(FMS)로 지원받는 국가</b>를 위해 TMDE를 <b>유지·교정·인증</b>하는 교정 활동을 지원하는 것이다."},
        {note:"\"countries supported through <b>FMS</b>\" — 미군 자국뿐 아니라 FMS 수출국까지 명시적으로 임무 범위에 든다. K-METCAL 사업의 표적이 바로 이 조항이다."},
        {h:"제1장 §1.2 — 조직"},
        {no:"1.2.", en:"Organization. Air Force Materiel Command (AFMC) is designated as the AF lead agent for establishing, planning, programming, budgeting, oversight, processes, and procedures for the AFMETCAL Program.", kr:"<b>조직.</b> 공군 자재사령부(AFMC)가 AFMETCAL 프로그램의 수립·기획·편성·예산·감독·프로세스·절차를 담당하는 <b>공군 주관 기관(lead agent)</b>으로 지정된다."},
        {no:"1.2.1.", en:"The Air Force Life Cycle Management Center, AFMETCAL Division (AFLCMC/WNM) is organized under the Agile Combat Support Directorate.", kr:"공군 수명주기관리센터(AFLCMC)의 <b>AFMETCAL 부서(AFLCMC/WNM)</b>는 민첩전투지원국 산하에 편성된다."},
        {no:"1.2.1.1.", en:"AFLCMC/WNM serves as the AF technical authority on metrology issues and is the AF single point of contact for calibration services and traceability of measurements to NIST.", kr:"AFLCMC/WNM은 계측 사안에 대한 <b>공군 기술 권위(technical authority)</b>이자, 교정 서비스와 NIST까지의 측정 소급성에 대한 <b>공군 단일 창구(single POC)</b> 역할을 한다."},
        {note:"\"<b>single point of contact</b>\"(단일 창구) — 거버넌스 렌즈에서 본 \"권한이 한 곳으로 수렴\"의 원문 근거. 교정의 기술 권위가 AFMETCAL 한 곳에 모인다."},
        {no:"1.2.2.", en:"AF Primary Standards Laboratory (AFPSL). ... The AFPSL is the sole AF-level laboratory responsible to maintain AF measurement standards. These unique standards are traceable to the International System of Units through NIST or other sources, as approved by AFMETCAL.", kr:"<b>공군 1차표준실험실(AFPSL).</b> … AFPSL은 공군 측정표준을 유지하는 <b>공군 유일의 최상위 실험실</b>이다. 이 표준들은 NIST 또는 AFMETCAL이 승인한 출처를 통해 국제단위계(SI)까지 소급된다."},
        {no:"1.2.1.2.", en:"AFLCMC/WNM makes TMDE calibration and repair responsibility determinations. AFMETCAL publishes responsibility determinations in TO 33K-1-100-1, TO 33K-1-100-2, Work Unit Code Reference Guide, and Calibration and Measurement Summary (CMS) TOs.", kr:"AFLCMC/WNM은 각 TMDE를 <b>누가 교정·수리할지 책임을 결정</b>한다. AFMETCAL은 이 책임 결정을 기술교범 TO 33K-1-100-1, TO 33K-1-100-2(업무단위코드 참조 가이드), 그리고 교정·측정 요약(CMS) TO에 <b>공표</b>한다."},
        {note:"\"누가 교정·수리할지 책임을 결정한다\" — 어떤 장비를 어느 절차로 교정할지가 사람의 판단이 아니라 <b>공표된 문서(TO 33K)</b>로 고정된다. CaliBoard가 가리키는 TO 33K가 바로 이 결정의 산출물이다."},
        {no:"1.2.2.", en:"AF Primary Standards Laboratory (AFPSL). The AFPSL will be operated in accordance with this DAFMAN and TO 00-20-14, Air Force Metrology/Calibration Program. The AFPSL is the sole AF-level laboratory responsible to maintain AF measurement standards. These unique standards are traceable to the International System of Units through NIST or other sources, as approved by AFMETCAL. AF measurement standards are used to ensure the accuracy and traceability of base measurement standards. Base measurement standards are TMDE provided to PMELs to support their mission.", kr:"<b>공군 1차표준실험실(AFPSL).</b> AFPSL은 이 DAFMAN과 TO 00-20-14(공군 측정/교정 프로그램)에 따라 운영된다. AFPSL은 공군 측정표준을 유지하는 <b>공군 유일의 최상위 실험실</b>이다. 이 표준들은 NIST 또는 AFMETCAL이 승인한 출처를 통해 국제단위계(SI)까지 소급된다. 공군 측정표준은 <b>기지 측정표준</b>의 정확성과 소급성을 보장하는 데 쓰이고, 기지 측정표준은 PMEL의 임무 지원을 위해 PMEL에 지급되는 TMDE다."},
        {note:"표준이 2층 구조다 — <b>공군 측정표준(AFPSL 보유) → 기지 측정표준(PMEL 보유)</b>. 위 표준이 아래 표준의 정확성을 보증하는 사슬이 조직 안에서 다시 반복된다."},
        {no:"1.2.3.", en:"Precision Measurement Equipment Laboratory (PMEL). The PMEL is the base-level AFMETCAL Program focal point. It is the activity authorized to possess and use base measurement standards. PMELs are established or closed at selected installations with Deputy Chief of Staff for Logistics, Engineering and Force Protection (AF/A4) approval. PMELs will be operated in accordance with this DAFMAN, TO 00-20-14 and DAFI 21-101, Aircraft and Equipment Maintenance Management, and other prescribed directives.", kr:"<b>정밀측정장비 실험실(PMEL).</b> PMEL은 <b>기지급</b> AFMETCAL 프로그램의 중심점이다. 기지 측정표준을 <b>보유·사용할 권한</b>을 가진 조직이다. PMEL의 신설·폐쇄는 군수참모차장(AF/A4)의 승인으로 결정된다. PMEL은 이 DAFMAN, TO 00-20-14, 그리고 DAFI 21-101(항공기·장비 정비관리)과 기타 규정에 따라 운영된다."},
        {note:"마지막 문장이 §1.7과 이어진다 — PMEL은 교정실인 동시에 <b>정비부대</b>라서 DAFI 21-101(정비 운영 규칙)도 같이 지켜야 한다. 소급성 사슬: NIST → AFPSL(공군 유일 1차표준) → PMEL(기지) → TMDE(현장 장비)."},
        {no:"1.2.4.", en:"Metrology and Calibration Flight (MCF). MCFs will be operated in accordance with this DAFMAN, TO 00-20-14, and applicable sections of AFSCMAN 21-102, Depot Maintenance Management. MCFs are established at Air Logistics Complexes (ALC) to provide calibration support to depots and other approved customers. ... MCFs must maintain core depot calibration and maintenance capabilities established in accordance with DoDI 4151.20, Depot Maintenance Core Capabilities Determination Process. (T-0)", kr:"<b>계측·교정대(MCF).</b> MCF는 이 DAFMAN, TO 00-20-14, 그리고 AFSCMAN 21-102(창정비 관리)의 해당 조항에 따라 운영된다. MCF는 <b>창(廠)급 군수단지(ALC)</b>에 설치되어 정비창과 승인된 고객에게 교정을 지원한다. … MCF는 DoDI 4151.20에 따라 수립된 <b>창급 핵심 교정·정비 역량</b>을 유지해야 한다. (T-0)"},
        {note:"PMEL(기지급) 위에 <b>MCF(창급)</b>가 있다 — 더 무거운 장비를 다루는 상위 정비창. (T-0) = 외부 법령(DoDI) 근거라 가장 면제하기 어려운 등급이다."},
        {h:"제1장 §1.3 — 교정·지원 개념 (수리 네트워크)"},
        {no:"1.3.", en:"Calibration and Support Concept. The AFMETCAL program is recognized as a Repair Network under Repair Network Management. Under RNM, the AFMETCAL Director serves as the Product Repair Manager.", kr:"<b>교정·지원 개념.</b> AFMETCAL 프로그램은 수리 네트워크 관리(RNM) 체계 아래 <b>하나의 수리 네트워크</b>로 인정된다. RNM 아래에서 AFMETCAL 책임자는 <b>제품 수리 관리자(Product Repair Manager)</b> 역할을 한다."},
        {note:"교정 조직 전체를 흩어진 실험실의 모음이 아니라 <b>하나로 엮인 수리 네트워크</b>로 본다. 한 노드가 못 하는 일을 다른 노드로 넘기는 구조 — CaliBoard의 \"유사 장비 빅데이터\" 발상이 닿는 지점이다."},
        {no:"1.3.1.", en:"Repair Network Managers are aligned under the AFMETCAL Plans and Analysis Section. Repair Network requirements and processes are defined in DAFI 20-117, Repair Network Management.", kr:"수리 네트워크 관리자들은 AFMETCAL <b>기획·분석과(Plans and Analysis Section)</b> 아래 편성된다. 수리 네트워크의 요구와 절차는 DAFI 20-117(수리 네트워크 관리)에 정의된다."},
        {no:"1.3.2.", en:"Major Command (MAJCOM) Functional Managers (MFM) serve as MAJCOM leads, and Flight Chiefs/PMEL Managers serve as node managers.", kr:"주력사령부(MAJCOM) <b>기능관리자(MFM)</b>가 사령부 단위 책임자를, <b>비행대장·PMEL 관리자</b>가 각 <b>노드 관리자</b>를 맡는다."},
        {no:"1.3.3.", en:"AF calibration activities consist of the AFPSL, PMELs, and the MCFs.", kr:"공군 교정 활동은 <b>AFPSL(공군 1차표준실) · PMEL(기지 교정실) · MCF(창급 교정대)</b> 세 가지로 구성된다."},
        {no:"1.3.3.3.", en:"DoD Services Calibration Laboratories. The use of other DoD Services calibration laboratories is authorized when approved by the applicable MFM and AFMETCAL. The Army, Navy, and Marine Corps operate calibration laboratories using similar measurement techniques and management concepts. These laboratories provide measurement traceability to the International System of Units through NIST.", kr:"<b>국방부 타군 교정실험실.</b> 타군(육·해·해병)의 교정실험실 이용은 해당 MFM과 AFMETCAL의 승인이 있을 때 허용된다. 육군·해군·해병대는 <b>유사한 측정 기법과 관리 개념</b>으로 교정실험실을 운영하며, 이들 역시 NIST를 통해 SI까지 측정 소급성을 제공한다."},
        {note:"미군 각 군이 \"유사한 측정 기법과 관리 개념\"을 공유하기에 서로 교정실을 빌려 쓸 수 있다 — 표준이 통일돼 있다는 뜻. K-METCAL이 이 표준 체계를 따라야 <b>상호운용(interoperability)</b>이 성립한다는 근거다."},
        {h:"제1장 §1.4 — TMDE 제한 (정밀도를 낮춰 쓰는 경우)"},
        {no:"1.4.", en:"TMDE Limitations. A limited TMDE calibration consists of reduced accuracies, ranges, functions, or overall usability and deviates from the original equipment manufacturer or AF specifications.", kr:"<b>TMDE 제한.</b> 제한 교정이란 정확도·범위·기능·전반적 사용성을 <b>낮춰서</b> 교정하는 것으로, 제조사(OEM)나 공군 규격에서 <b>벗어난</b> 상태를 말한다."},
        {no:"1.4.1.", en:"TMDE limitations may seriously impact the mission capability of weapon systems and support agencies. Users approving limitations must take caution to ensure any limitations meet the user requirement defined in a TO, work card, or other technical data used to perform a task.", kr:"TMDE 제한은 무기체계와 지원기관의 <b>임무 수행 능력에 심각한 영향</b>을 줄 수 있다. 제한을 승인하는 사용자는 그 제한이 기술교범(TO)·작업카드 등에 정의된 <b>사용 요건을 여전히 충족</b>하는지 신중히 확인해야 한다."},
        {no:"1.4.2.", en:"Non-aircraft, general, or common TMDE (i.e., torque wrenches, pressure gauges, multi-meters, generators) may be limited with approval from the user. Limitation approval requirements are defined in TO 00-20-14 and DAFI 21-101.", kr:"비항공기·일반·공통 TMDE(예: <b>토크렌치·압력게이지·멀티미터·발전기</b>)는 사용자 승인 하에 제한 교정할 수 있다. 제한 승인 요건은 TO 00-20-14와 DAFI 21-101에 정의된다."},
        {note:"원문이 \"<b>토크렌치</b>\"를 일반 TMDE의 첫 예로 직접 든다 — 임채욱 키노트가 토크렌치를 공통분모로 잡은 근거가 군 표준 원문에 그대로 있다. 토크렌치는 \"제한을 승인해서라도 쓰는\" 현장 밀착형 장비의 대표격이다."},
        {no:"1.4.2.2.", en:"PMEL personnel are considered trained on TMDE limitations and are not required to attend maintenance group calibration limitation approval certification program per DAFI 21-101. Flight Chiefs will recommend and approve PMEL personnel to be added to the Special Certification Roster. (T-3)", kr:"PMEL 인력은 TMDE 제한에 대해 <b>이미 훈련된 것으로 간주</b>되어, DAFI 21-101의 정비단 제한승인 인증 과정을 별도로 이수할 필요가 없다. 비행대장이 PMEL 인력을 <b>특별인증명부(SCR)</b>에 추가하도록 추천·승인한다. (T-3)"},
        {note:"(T-3) = 현장 지휘관 재량으로 면제 가능한 가장 낮은 등급. 제한 교정의 책임 판단을 현장에 가까운 선에서 처리한다는 뜻이다."},
        {h:"제1장 §1.5 — 사이버보안 기강"},
        {no:"1.5.", en:"Cybersecurity Discipline. Calibration activities are required to maintain and perform positive maintenance cyber discipline practices defined in TO 33-1-38, Cybersecurity for Automatic Test Systems and Automatic Test Equipment; TO 00-20-14; TO 33K-1-1, General Instructions Cybersecurity for Test, Measurement and Diagnostic Equipment in the AF Metrology Program, and other prescribed directives.", kr:"<b>사이버보안 기강.</b> 교정 활동은 TO 33-1-38(자동시험시스템·장비 사이버보안), TO 00-20-14, TO 33K-1-1(공군 계측 프로그램 내 TMDE 사이버보안 일반지침) 등에 정의된 <b>능동적 사이버보안 정비 관행</b>을 유지·수행해야 한다."},
        {note:"현대 교정 장비는 소프트웨어로 돌아가는 자동시험장비(ATE)라서 <b>사이버보안</b>이 측정 신뢰성의 일부가 됐다. 옛 ISO 10012:2003엔 없던 21세기 항목이다."},
        {h:"제1장 §1.6 — 획득 요구사항 (살 때부터 교정을 설계)"},
        {no:"1.6.", en:"Acquisition Requirements. Acquisition of systems and equipment includes assessment of calibration and measurement requirements. For additional information see MIL-HDBK 1839A, DoD Handbook Calibration and Measurement Requirements. Acquisitions requiring a Calibration and Measurement Requirement Summary will comply with MIL-STD 1839, Calibration and Measurement Requirements. (T-0)", kr:"<b>획득 요구사항.</b> 시스템·장비를 <b>획득(구매)할 때부터</b> 교정·측정 요구를 평가에 포함한다. 자세한 내용은 MIL-HDBK-1839A(국방부 교정·측정요구 핸드북)를 보라. 교정·측정요구 요약(CMRS)이 필요한 획득은 <b>MIL-STD-1839(교정·측정요구)를 준수</b>한다. (T-0)"},
        {note:"<b>K-METCAL 사업의 정수.</b> \"장비를 살 때부터 교정 요구를 설계한다\" — KOLAS엔 없는 발상이다. 무기체계 획득 단계에서 미래 교정 요구를 MIL-STD-1839(강제규격)·MIL-HDBK-1839A(지침)로 미리 박아둔다. (T-0)이라 가장 엄격하게 강제된다."},
        {no:"1.6(계속)", en:"PMELs, MCFs, PMEL customers, TMDE owners, and PMs will obtain AFMETCAL approval prior to obtaining commercial calibration support (including contract logistics support) or when deviating from established calibration determinations or support plans. PMs will comply with this DAFMAN and AFI 63-101/20-101, Integrated Life Cycle Management.", kr:"PMEL·MCF·PMEL 고객·TMDE 소유자·사업관리자(PM)는 <b>상용 교정 지원(계약군수지원 포함)을 받거나</b> 기존 교정 결정·지원계획에서 벗어나려면 <b>사전에 AFMETCAL 승인</b>을 받아야 한다. PM은 이 DAFMAN과 AFI 63-101/20-101(통합수명주기관리)을 준수한다."},
        {note:"\"상용 교정 지원\"을 받으려면 AFMETCAL의 사전 승인이 필요하다 — 외부 교정업체(KTL 같은)가 군 교정에 들어가려면 반드시 거쳐야 하는 관문이다. K-METCAL 위탁운영의 법적 통제점이 여기다."},
        {h:"제1장 §1.7 — 항공기 정비정책 요건"},
        {no:"1.7.", en:"Aircraft Maintenance Policy Requirement. PMELs will comply with applicable sections of DAFI 21-101. Maintenance Standardization and Evaluation Program (MSEP), Tools/Equipment Management, and foreign object damage (FOD) requirements for the PMEL are clarified below under TMDE Flight Chief, PMEL Quality Manager, and PMEL Section Chief responsibilities.", kr:"<b>항공기 정비정책 요건.</b> PMEL은 DAFI 21-101의 해당 조항을 준수한다. PMEL에 적용되는 <b>정비표준화평가(MSEP)·공구/장비 관리·이물질손상(FOD) 방지</b> 요건은 아래 TMDE 비행대장·PMEL 품질관리자·PMEL 직장(Section Chief) 책임 항목에서 구체화된다."},
        {note:"§1.2.3 마지막 문장이 여기서 매듭지어진다 — PMEL은 교정실인 동시에 <b>정비부대</b>라서, 측정 기술과 별개로 공구 분실 방지·FOD 같은 <b>정비 현장 운영 규칙(DAFI 21-101)</b>까지 지켜야 한다. 제1장이 \"무엇을·누가·어떤 규칙으로\"를 한 바퀴 돈 셈이다."}
      ]
    }
  },
  dafi21101: {
    code:"DAFI 21-101", ename:"Aircraft and Equipment Maintenance Management (309쪽) · 시행규칙(I) · A4L 발급",
    oneliner:"공군 정비부대가 <b>매일 항공기·장비를 어떻게 정비·관리하나</b>의 현장 규칙. <b>PMEL</b>(기지 교정실)<b>도 '정비기관'이라 이걸 따라야 함</b> (교정 절차가 아니라 운영 규칙).",
    lineage:"<b>DAFMAN 21-113</b>(교정 헌법)이 §1.7에서 '<b>PMEL도 정비부대니 이 규칙을 지켜라</b>'고 위임한 문서. 교정 '기술'이 아니라 정비부대 '운영'(공구·FOD·평가)을 규정 — 즉 교정 계보의 <b>옆가지(운영 규칙)</b>.",
    analogy:"교정실의 <b>'일반 안전·시설 관리 수칙'</b>. 측정 기술과 별개로, '공구 분실 말 것·이물질 떨어뜨리지 말 것' 같은 <b>작업장 운영 규칙</b>에 해당. 어느 정비소든 따르는 공통 수칙.",
    flow:[
      "21-113이 위임 (§1.7): PMEL은 FOD·공구관리·MSEP 등 21-101 해당 조항 준수",

// ── 자동 연결 (id 하드코딩 불필요) ─────────────────────────────────
// DOCS에 항목을 추가하면, 그 문서를 가리키는 칩·행이 자동으로 활성화된다.
// 매칭 원칙: DOCS[id].code 문자열이 칩 label / DOCTREE 코드 안에 포함되면 그 id로 연결.
// 코드가 긴 것부터 검사(예: 'TO 00-20-14'가 'TO 00-20-1'보다 먼저)해 오매칭 방지.
const CODE_ENTRIES = Object.keys(DOCS)
  .map(id => ({ id, code: DOCS[id].code }))
  .sort((a,b) => b.code.length - a.code.length);
// 명시적 id가 없을 때 텍스트로 DOCS 항목을 자동 탐색. 못 찾으면 null.
function autoDocId(text){
  if(!text) return null;
  for(const e of CODE_ENTRIES){ if(text.includes(e.code)) return e.id; }
  return null;
}
// 칩/행이 실제로 연결할 id: 명시 id 우선, 없으면 자동 매칭.
function resolveChipId(d){ return d.id || autoDocId(d.label); }
function resolveRowId(d){ return d.id || autoDocId(d.c); }

const panel = document.getElementById('panel');
// 문서 상세 HTML 생성 — 단일 소스(DOCS). 우측 패널·슬라이드 패널이 공유.
// ── 문서 패널 4탭: 개요 / 핵심 / 원문 상세 / 통번역 ──
function tabOverview(d){
  let t = `<div class="oneliner">${d.oneliner}</div>`;
  if(d.lineage || d.analogy){
    t += `<div class="primer">`;
    if(d.lineage) t += `<div class="row lineage"><span class="ic">🔗</span><div><b>이 문서의 자리</b> — ${d.lineage}</div></div>`;
    if(d.analogy) t += `<div class="row analogy"><span class="ic">💡</span><div><b>쉽게 비유하면</b> — ${d.analogy}</div></div>`;
    t += `</div>`;
  }
  return t;
}
function tabCore(d){
  let t = `<div class="sec"><h3>흐름 — 이 문서가 말하는 순서</h3><ol class="flowlist">`;
  d.flow.forEach(f=> t+=`<li>${f}</li>`);
  t += `</ol></div>`;
  t += `<div class="sec"><h3>KOLAS vs 군 — 대조</h3><table><tr><th>항목</th><th class="col-kolas">KOLAS 세계 (익숙)</th><th class="col-mil">군 세계 (생소)</th></tr>`;
  d.table.forEach(r=> t+=`<tr><td>${r[0]}</td><td class="col-kolas">${r[1]}</td><td class="col-mil">${r[2]}</td></tr>`);
  t += `</table></div>`;
  t += `<div class="strange"><div class="t">⚠ 가장 생소할 개념</div><ol>`;
  d.strange.forEach(s=> t+=`<li>${s}</li>`);
  t += `</ol></div>`;
  t += `<div class="biz">💼 <b>사업 관점</b> — ${d.biz}</div>`;
  return t;
}
function tabDetail(d){
  let t = '';
  d.detail.groups.forEach(g=>{
    t += `<div class="grp"><div class="h">${g.h}</div><ul>`;
    g.items.forEach(i=> t+=`<li>${i}</li>`);
    t += `</ul></div>`;
  });
  if(d.detail.src) t += `<div class="src">📄 출처: ${d.detail.src}</div>`;
  return t;
}
/* ════════════════════════════════════════════════════════════════════
 *  통번역(translation) 공통 모듈 — 스키마 (★ 모든 표준 문서에 이 틀로 채우면 끝)
 * ────────────────────────────────────────────────────────────────────
 *  새 문서를 통번역하려면 DOCS[id]에 아래 형태의 translation 키만 추가한다.
 *  tabTrans()/trItemHtml()는 문서를 가리지 않는 공통 렌더라 코드 수정 불필요.
 *  추가 즉시 '🌐 통번역' 탭이 자동 노출되고 장(章) 아코디언이 자동 생성된다.
 *
 *  DOCS.<id>.translation = {
 *    meta: "이 통번역의 범위·판본 안내 (상단 회색 박스). 생략 가능",
 *    items: [
 *      { h:"제2장 §2.1 — 일반" },                 // 섹션 헤더 → 아코디언 한 칸이 됨(경계)
 *      { no:"2.1.",  en:"원문 직역", kr:"자연스러운 의역" },  // 조항: 영문↓한글 교차
 *      { no:"2.1.1.", en:"...", kr:"..." },        // no의 점(.) 개수 → 들여쓰기 depth 자동(최대3)
 *      { note:"💡 해설/맥락 박스 (조항 사이에 끼움)" },
 *      ...
 *    ]
 *  }
 *  규칙 ① {h:} 를 만날 때마다 새 아코디언 섹션이 열린다(첫 {h:} 이전 항목들은
 *        '표지·머리말' 섹션으로 자동 수렴).  ② 기본 전부 접힘.  ③ en/kr/note 안의
 *        군 약어는 highlightTerms가 자동 밑줄·툴팁 연결(TERMS 소스).  ④ kr만/en만도 허용.
 * ════════════════════════════════════════════════════════════════════ */
// 통번역 본문 항목 1개(조항/해설) 렌더 — 헤더(h)는 섹션 summary로 승격되므로 여기선 처리 안 함
function trItemHtml(it){
  if(it.note) return `<div class="tr-note">💡 ${it.note}</div>`;
  const depth = it.no ? Math.min((it.no.match(/\./g)||[]).length, 3) : 1;
  let t = `<div class="tr-clause tr-depth${depth}">`;
  if(it.no) t += `<div class="tr-no">${it.no}</div>`;
  if(it.en) t += `<div class="tr-en">${it.en}</div>`;
  if(it.kr) t += `<div class="tr-kr">${it.kr}</div>`;
  return t + `</div>`;
}
// 통번역 탭 — {h:}를 경계로 장(章)/절(節)을 아코디언 섹션으로 묶음. 첫 섹션만 펼침.
// 데이터(items)는 무변경: 헤더 없는 선행 항목(표지 등)은 '표지·머리말' 섹션으로 자동 수렴.
function tabTrans(d){
  const tr = d.translation;
  let t = '';
  if(tr.meta) t += `<div class="tr-meta">${tr.meta}</div>`;
  // 1) items를 헤더 경계로 섹션 분할
  const secs = [];
  let cur = null;
  tr.items.forEach(it=>{
    if(it.h){ cur = {title:it.h, body:[]}; secs.push(cur); return; }
    if(!cur){ cur = {title:'표지 · 머리말', body:[]}; secs.push(cur); }
    cur.body.push(it);
  });
  // 2) 섹션마다 <details> 아코디언. 기본 전부 접힘(사용자가 필요한 절만 펼침).
  secs.forEach((s,i)=>{
    const n = s.body.filter(b=>b.no).length;       // 조항 수 표기
    const cnt = n ? `<span class="cnt">${n}개 조항</span>` : '';
    t += `<details class="tr-acc">`;
    t += `<summary><span class="caret">▶</span>${s.title}${cnt}</summary>`;
    t += `<div class="tr-acc-body">`;
    s.body.forEach(it=> t += trItemHtml(it));
    t += `</div></details>`;
  });
  return t;
}
function buildDocHtml(id){
  const d = DOCS[id];
  if(!d) return null;
  const TABS = [
    {k:'overview', label:'📌 개요',      show:true,            html:()=>tabOverview(d)},
    {k:'core',     label:'🗺️ 핵심',      show:true,            html:()=>tabCore(d)},
    {k:'detail',   label:'📖 원문 상세',  show:!!d.detail,      html:()=>tabDetail(d)},
    {k:'trans',    label:'🌐 통번역',     show:!!d.translation, html:()=>tabTrans(d)},
  ].filter(tb=>tb.show);
  let t = `<div class="panel-doc"><h2>${d.code}</h2><div class="ename">${d.ename}</div>`;
  t += `<div class="dtabs">`;
  TABS.forEach((tb,i)=> t += `<button class="dtab${i===0?' active':''}" data-dtab="${tb.k}">${tb.label}</button>`);
  t += `</div>`;
  t += `<div class="dtab-body">`;
  TABS.forEach((tb,i)=> t += `<div class="dtab-pane${i===0?' active':''}" data-dpane="${tb.k}">${tb.html()}</div>`);
  t += `</div>`;
  t += `</div>`;
  return t;
}
// 문서계층 탭: 우측 고정 패널에 렌더
function render(id){
  const t = buildDocHtml(id);
  if(t===null) return;
  panel.innerHTML = t;
  highlightTerms(panel);
  panel.scrollTop = 0;
}
// 문서 패널 내부 탭 전환 (개요/핵심/원문상세/통번역) — 이벤트 위임
function wireDocTabs(container){
  container.addEventListener('click', e=>{
    const btn = e.target.closest('.dtab');
    if(!btn || !container.contains(btn)) return;
    const root = btn.closest('.panel-doc');
    if(!root) return;
    const k = btn.dataset.dtab;
    root.querySelectorAll('.dtab').forEach(b=>b.classList.toggle('active', b.dataset.dtab===k));
    root.querySelectorAll('.dtab-pane').forEach(p=>p.classList.toggle('active', p.dataset.dpane===k));
    container.scrollTop = 0;
  });
}
// 전체 흐름: 우측 슬라이드 패널에 렌더 (단일 소스 buildDocHtml 공유)
const slidePanel = document.getElementById('slidePanel');
const slideOverlay = document.getElementById('slideOverlay');
const slideBody = document.getElementById('slideBody');
// 두 패널에 문서 탭 전환 핸들러 연결 (한 번만)
wireDocTabs(panel);
wireDocTabs(slideBody);
function openSlide(id){
  const t = buildDocHtml(id);
  if(t===null){
    slideBody.innerHTML = `<div class="slide-todo"><h2>${id}</h2><p>이 문서의 상세 정리는 아직 준비 중입니다.<br>원문 탐독 후 추가될 예정입니다.</p></div>`;
  } else {
    slideBody.innerHTML = t;
    highlightTerms(slideBody);
  }
  slideBody.scrollTop = 0;
  slidePanel.classList.add('open');
  slideOverlay.classList.add('show');
}
function closeSlide(){
  slidePanel.classList.remove('open');
  slideOverlay.classList.remove('show');
}
document.getElementById('slideClose').addEventListener('click', closeSlide);
slideOverlay.addEventListener('click', closeSlide);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSlide(); });
// ── 문서 계층(좌측) 렌더 ───────────────────────────────────────────
let docStatusFilter = 'all';   // 상태 필터 (표준현황 흡수)
function renderDocTree(){
  // 상태 범례 = 상태 필터 버튼 겸용
  document.getElementById('statusLegend').innerHTML =
    '<span class="sl-title">상태 필터:</span>' +
    `<button class="sl-filter ${docStatusFilter==='all'?'on':''}" data-st="all">전체</button>` +
    Object.entries(STATUS).map(([k,v])=>
      `<button class="sl-filter ${docStatusFilter===k?'on':''}" data-st="${k}"><i class="sl-dot" style="background:${v.col}"></i>${v.ko}</button>`).join('');

  // 영역별 트리
  const tree = document.getElementById('docTree');
  let total = 0, done = 0, shown = 0;
  tree.innerHTML = DOCTREE.map(area=>{
    let areaShown = 0;
    const rows = area.docs.map(d=>{
      const gid = resolveRowId(d);   // 명시 id 우선, 없으면 DOCS.code 자동 매칭
      total++; if(gid) done++;
      if(docStatusFilter!=='all' && d.s!==docStatusFilter) return '';
      areaShown++; shown++;
      const st = STATUS[d.s] || STATUS.active;
      const clickable = gid ? 'doc-row link' : 'doc-row';
      const meta = (d.rev||d.date) ? `<span class="dr-meta">${[d.rev,d.date].filter(Boolean).join(' · ')}</span>` : '';
      return `<div class="${clickable}" ${gid?`data-id="${gid}"`:''} style="--st:${st.col}">
        <span class="dr-status" title="${st.ko}"></span>
        <span class="dr-code">${d.c}</span>
        <span class="dr-name">${d.n}</span>
        ${meta}
        <span class="dr-badge" style="background:${st.col};color:${st.fg}">${st.ko}</span>
        ${gid?'<span class="dr-go">상세 ↗</span>':''}
      </div>`;
    }).join('');
    if(areaShown===0) return '';
    return `<div class="area" style="--ac:${area.color}">
      <div class="area-head"><span class="area-en">${area.area}</span><span class="area-ko">${area.ko}</span>
        <span class="area-cnt">${areaShown}</span></div>
      <div class="area-rows">${rows}</div>
    </div>`;
  }).join('');

  // 요약 (기존 것 갱신 또는 생성)
  let summary = document.getElementById('treeSummary');
  if(!summary){ summary=document.createElement('div'); summary.id='treeSummary'; summary.className='tree-summary'; tree.parentNode.insertBefore(summary, tree); }
  const filterNote = docStatusFilter==='all' ? '' : ` · ${STATUS[docStatusFilter].ko}만 ${shown}건`;
  summary.innerHTML = `총 <b>${total}</b>개 문서 · ${DOCTREE.length}개 영역 · 상세정리 <b>${done}</b>건${filterNote} <span class="sum-hint">· 폐지 ≠ 미사용(레거시 군계약 잔존)</span>`;

  // 상태 필터 버튼
  document.getElementById('statusLegend').querySelectorAll('.sl-filter').forEach(b=>
    b.addEventListener('click', ()=>{ docStatusFilter=b.dataset.st; renderDocTree(); }));

  // 이벤트 위임 — 클릭 가능한 문서만 상세로 (중복 방지 위해 1회만)
  if(tree.dataset.bound) return;
  tree.dataset.bound = '1';
  tree.addEventListener('click', e=>{
    const row = e.target.closest('.doc-row.link');
    if(!row) return;
    tree.querySelectorAll('.doc-row').forEach(d=>d.classList.remove('active'));
    row.classList.add('active');
    render(row.dataset.id);
  });
}
renderDocTree();

  {a:"PD", f:"Policy Directive", c:"doc", d:"<b>정책 지침</b> = 군의 '헌법/법률'급. '~를 한다'는 의지 선언. 짧고 추상적. (DAFPD 21-1)"},
  {a:"MAN", f:"Manual", c:"doc", d:"<b>매뉴얼</b> = '시행령'급. 정책을 '이렇게 운영한다' — 조직·역할·책임. (DAFMAN 21-113)"},
  {a:"I", f:"Instruction", c:"doc", d:"<b>지시</b> = '시행규칙'급. 야전 부대가 지키는 현장 규칙. (DAFI 21-101)"},
  {a:"TO", f:"Technical Order", c:"doc", d:"<b>기술교범</b> = '작업표준서(SOP)'. 손으로 따라 하는 실제 절차. (TO 00-20-14)"},
  {a:"AFMAN vs DAFMAN", f:"AF vs DAF Manual", c:"doc", d:"<b>같은 문서의 옛/새 이름</b>. AF(공군만)→DAF(공군+우주군). 2019 우주군 창설로 개명."},
  {a:"MIL-STD / MIL-PRF", f:"Military Standard / Performance Spec", c:"doc", d:"<b>미 국방부(DoD) 규격</b>. 전군(육·해·공) 공통. 공군전용 아님. (MIL-STD-1839D는 공군 AFMETCAL이 관리)"},
  {a:"ANSI/NCSL Z540.3", f:"-", c:"doc", d:"<b>미국 민간 국가표준</b>(군 아님). 군이 계약서에 인용. TUR 4:1·FAR≤2% 출처."},
  {a:"ISO/IEC 17025", f:"-", c:"doc", d:"<b>교정·시험소 적격성 국제표준</b>. <b>KOLAS의 근거</b>. §6.4.7(주기조정)·§6.4.10(중간점검)이 우리 논리 근거."},
  {a:"ISO 10012", f:"-", c:"doc", d:"<b>측정관리시스템 국제표준</b>. §7.1.2 '데이터로 주기 조정하라' = 우리 핵심 근거."},
  {a:"RP-1 / RP-18", f:"NCSL Recommended Practice", c:"doc", d:"<b>RP-1=교정주기 방법론</b> / <b>RP-18=판정리스크(FAR/FRR)</b>. 둘 다 NCSL 민간학회. 저자 동일(Castrup)."},
  {a:"CFETP", f:"Career Field Education and Training Plan", c:"doc", d:"<b>특기 교육훈련 계획</b>. CFETP 2P0X1 = PMEL 기술자(특기코드 2P0X1) 양성 계획."},
];
const CATNAME = {kr:"🇰🇷 한국 기관", us:"🇺🇸 미국/국제", mil:"군 개념", metro:"계측·통계", doc:"문서 종류"};
const glossEl = document.getElementById('glosslist');
let curCat = 'all', curQ = '';
function renderGloss(){
  const q = curQ.trim().toLowerCase();
  const hits = TERMS.filter(t=>{
    if(curCat!=='all' && t.c!==curCat) return false;
    if(!q) return true;
    return (t.a+t.f+t.d).toLowerCase().includes(q);
  });
  if(!hits.length){ glossEl.innerHTML = `<div class="nohit">검색 결과 없음</div>`; return; }
  glossEl.innerHTML = hits.map(t=>
    `<div class="term ${t.c}"><div class="abbr">${t.a}</div><div class="full">${t.f}</div><div class="desc">${t.d}</div></div>`
  ).join('');
}
document.getElementById('search').addEventListener('input', e=>{ curQ=e.target.value; renderGloss(); });
document.querySelectorAll('.gf').forEach(b=>b.addEventListener('click', ()=>{
  document.querySelectorAll('.gf').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); curCat=b.dataset.cat; renderGloss();
}));

/* ===== 탭 전환 ===== */
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click', ()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  const v = t.dataset.view;
  document.getElementById('view-docs').style.display = (v==='docs')?'block':'none';
  document.getElementById('view-glossary').style.display = (v==='glossary')?'block':'none';
  document.getElementById('view-chain').style.display = (v==='chain')?'block':'none';
  if(v==='glossary') renderGloss();
  if(v==='chain') renderChain();
}));

// 전체 흐름에서 문서 칩 클릭 → 우측 슬라이드 패널 (탭 이동 없음, 맥락 유지)
function gotoDoc(id){
  openSlide(id);
}

// ── 전체 흐름 관점 렌더 ────────────────────────────────────────────
let curLens = 'traceability';
let detailMode = 'all';   // 핵심/전체 토글 (기본=전체)
function renderChain(){ drawLens(curLens); }
const docChip = d => {
  if(d.id==='__core8__')          // 5계층 L3 → 8Core 관점으로 점프하는 특수 칩
    return `<span class="task-doc lensjump" data-lens="core8">${d.label}</span>`;
  const gid = resolveChipId(d);   // 명시 id 우선, 없으면 DOCS.code 자동 매칭
  return gid
    ? `<span class="task-doc link" data-goto="${gid}">${d.label} ↗</span>`
    : `<span class="task-doc">${d.label}</span>`;
};

function drawLens(key){
  document.querySelectorAll('.lens').forEach(b=>b.classList.toggle('active', b.dataset.lens===key));
  const wrap = document.querySelector('.chain-flow');

  if(key==='core8'){            // 구성 — 카드 그리드
    document.getElementById('lensTitle').textContent = '🧩 8 핵심 구성요소 — 체계는 무엇으로 이루어지는가';
    document.getElementById('lensDesc').innerHTML = '흐름이 아니라 <b>구성</b>의 관점. 측정·교정 체계를 8개 기능요소로 분해한 것이며, 사업의 매출 영역(장비·SW·서비스)과 그대로 대응한다. <b>전체</b> 모드는 문서계층 전체 표준을 8요소에 빠짐없이 분배한 것. <br><b>① 원문자 = 구성 순서</b>(Documentation부터), <b>"착수 N순위" 뱃지 = KAI 제안서의 개발 착수 순서</b>(장비→시험소→문서화→훈련→IETM→Program→교정서비스) — <b>무엇으로 이뤄지나</b>와 <b>무엇부터 만드나</b>는 다르다.';
    let html = `<div class="detail-toggle">
      <span class="dt-label">표준 표시:</span>
      <button class="dt ${detailMode==='core'?'active':''}" data-mode="core">핵심</button>
      <button class="dt ${detailMode==='all'?'active':''}" data-mode="all">전체</button>
    </div>`;
    html += `<div class="core-grid">${CORE8.map(c=>{
      const docs = (detailMode==='all' && c.more) ? c.docs.concat(c.more) : c.docs;
      const prio = c.prio ? `<span class="core-prio" title="KAI 제안서 실행 우선순위">착수 ${c.prio}순위</span>` : '';
      return `<div class="core-card" style="--cc:${c.color}">
        <div class="core-top"><span class="core-no">${c.n}</span>
          <span class="core-t">${c.t}</span><span class="core-e">${c.e}</span>${prio}</div>
        <div class="core-d">${c.d}</div>
        ${docs.length?`<div class="task-docs">${docs.map(docChip).join('')}</div>`:''}
      </div>`;}).join('')}</div>`;
    wrap.innerHTML = html;
    wrap.querySelectorAll('.dt').forEach(b=>b.addEventListener('click', ()=>{
      detailMode = b.dataset.mode; drawLens(key);
    }));
  }
  else {                        // 흐름형 (소급성/일생/사업/거버넌스)
    const L = LENSES[key];
    document.getElementById('lensTitle').textContent = L.title;
    document.getElementById('lensDesc').innerHTML = L.desc;
    // 핵심/전체 토글 — more 가진 단계가 하나라도 있을 때만 노출
    const hasMore = L.steps.some(s=>s.more && s.more.length);
    let html = '';
    if(hasMore){
      html += `<div class="detail-toggle">
        <span class="dt-label">표준 표시:</span>
        <button class="dt ${detailMode==='core'?'active':''}" data-mode="core">핵심</button>
        <button class="dt ${detailMode==='all'?'active':''}" data-mode="all">전체</button>
      </div>`;
    }
    html += '<div class="timeline'+(L.layers?' layers':'')+'" style="--fc:'+L.color+'">';
    L.steps.forEach((s, i)=>{
      const docs = (detailMode==='all' && s.more) ? s.docs.concat(s.more) : s.docs;
      const last = i===L.steps.length-1 ? ' last' : '';
      const railTxt = L.layers ? `L${i+1}` : (i+1);
      html += `<div class="tstep${last}">
        <div class="tstep-rail"><span class="tstep-no${L.layers?' tier':''}">${railTxt}</span></div>
        <div class="tstep-card">
          <div class="tstep-head"><span class="tstep-k">${s.k}</span><span class="tstep-v">${s.v}</span></div>
          <div class="tstep-d">${s.d}</div>
          ${docs.length?`<div class="tstep-docs">${docs.map(docChip).join('')}</div>`:''}
        </div>
      </div>`;
    });
    html += '</div>';
    html += `<div class="flownote" style="border-color:${L.color}">💡 ${L.note}</div>`;
    wrap.innerHTML = html;

    wrap.querySelectorAll('.dt').forEach(b=>b.addEventListener('click', ()=>{
      detailMode = b.dataset.mode; drawLens(key);
    }));
  }

  wrap.querySelectorAll('.task-doc.link').forEach(el=>{
    el.addEventListener('click', ()=> gotoDoc(el.dataset.goto));
  });
  wrap.querySelectorAll('.task-doc.lensjump').forEach(el=>{
    el.addEventListener('click', ()=>{ curLens = el.dataset.lens; drawLens(curLens); });
  });
  highlightTerms(wrap);
}
document.querySelectorAll('.lens').forEach(b=>b.addEventListener('click', ()=>{
  curLens = b.dataset.lens; drawLens(curLens);
}));

// ── 용어 호버 툴팁 ─────────────────────────────────────────────────
// 본문에서 TERMS 약어를 자동 감지 → 점선 밑줄 + 호버 시 뜻 팝업.
// 단일 소스(TERMS) 재사용. 한 컨테이너 안에서 같은 약어는 "첫 등장만" 표시(지저분함 방지).
const TERMMAP = {};
TERMS.forEach(t=>{ TERMMAP[t.a] = t; });
// 긴 약어 우선 매칭 (예: 'ISO 10012'가 'ISO'보다 먼저)
const TERMKEYS = Object.keys(TERMMAP)
  .filter(k=>/^[A-Za-z0-9][A-Za-z0-9 .\/()&-]*$/.test(k))   // 영문/숫자 약어 (괄호·&·/ 허용, 한글 제외)
  .sort((a,b)=>b.length-a.length);
// 각 키마다 끝 문자가 영숫자일 때만 단어경계(\b)를 붙임 — '(', ')', '/' 등으로 끝나는 약어도 매칭되도록
const _esc = k => k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
const _alt = TERMKEYS.map(k=>{
  const pre  = /^[A-Za-z0-9]/.test(k) ? '\\b' : '';
  const post = /[A-Za-z0-9]$/.test(k) ? '\\b' : '';
  return pre + _esc(k) + post;
}).join('|');
const TERM_RE = new RegExp('(' + _alt + ')');

function highlightTerms(root){
  if(!TERMKEYS.length) return;
  const seen = new Set();
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n){
      if(!n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      const p = n.parentElement;
      if(!p) return NodeFilter.FILTER_REJECT;
      // 칩·코드·이미 처리된 곳·제목은 제외
      if(p.closest('.task-doc,.gloss-term,.dr-code,h1,h2,h3,summary,.abbr')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const targets = [];
  let node; while(node = walker.nextNode()) targets.push(node);
  targets.forEach(textNode=>{
    let txt = textNode.nodeValue;
    const frag = document.createDocumentFragment();
    let last = 0, m, re = new RegExp(TERM_RE.source, 'g');
    while((m = re.exec(txt))){
      const term = m[1];
      if(seen.has(term)) continue;       // 첫 등장만
      seen.add(term);
      if(m.index > last) frag.appendChild(document.createTextNode(txt.slice(last, m.index)));
      const span = document.createElement('span');
      span.className = 'gloss-term';
      span.dataset.term = term;
      span.textContent = term;
      frag.appendChild(span);
      last = m.index + term.length;
    }
    if(last > 0){
      if(last < txt.length) frag.appendChild(document.createTextNode(txt.slice(last)));
      textNode.parentNode.replaceChild(frag, textNode);
    }
  });
}

const glossTip = document.getElementById('glossTip');
document.addEventListener('mouseover', e=>{
  const el = e.target.closest('.gloss-term');
  if(!el) return;
  const t = TERMMAP[el.dataset.term];
  if(!t) return;
  glossTip.innerHTML = `<div class="gt-abbr">${t.a}</div><div class="gt-full">${t.f}</div><div class="gt-desc">${t.d}</div>`;
  glossTip.classList.add('show');
  const r = el.getBoundingClientRect();
  glossTip.style.left = Math.min(r.left, window.innerWidth - 320) + 'px';
  glossTip.style.top = (r.bottom + 6) + 'px';
});
document.addEventListener('mouseout', e=>{
  if(e.target.closest('.gloss-term')) glossTip.classList.remove('show');
});

// 초기 진입 = 전체 흐름이 메인
renderChain();
</script>
